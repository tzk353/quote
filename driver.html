<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>司機結單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6fb;--white:#fff;
  --border:#e2e6ef;--border2:#c8d0e0;
  --gold:#b8870a;--gold-light:#fdf8ee;--gold-border:#e8d9a8;
  --text:#1a1a2e;--dim:#6b7280;--muted:#9ca3af;
  --green:#16a34a;--green-light:#f0fdf4;--green-border:#bbf7d0;
  --red:#dc2626;--blue:#2563eb;--blue-light:#eff6ff;
  --fm:'DM Mono',monospace;--fb:'Noto Sans TC',sans-serif;--fs:'Noto Serif TC',serif;
  --r:12px;--shadow:0 2px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:15px;line-height:1.6;min-height:100vh;padding-bottom:3rem}

.header{background:linear-gradient(135deg,#1a1a2e,#2d2d4e);padding:1rem 1.3rem;display:flex;align-items:center;justify-content:space-between}
.ht{font-family:var(--fs);font-size:1rem;color:#c9a84c}
.hs{font-family:var(--fm);font-size:.58rem;letter-spacing:.15em;color:#555;margin-top:1px}
.hbadge{background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.4);color:#c9a84c;font-family:var(--fm);font-size:.65rem;padding:.2rem .6rem;border-radius:20px}
.hbtns{display:flex;gap:.4rem}
.hbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:7px;padding:.28rem .65rem;font-size:.7rem;cursor:pointer;font-family:var(--fm)}

.nav{display:flex;background:#fff;border-bottom:1px solid var(--border)}
.nav-tab{flex:1;padding:.55rem .3rem;text-align:center;font-family:var(--fm);font-size:.6rem;letter-spacing:.04em;color:var(--muted);border-bottom:3px solid transparent;cursor:pointer;transition:all .2s}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}
.nav-tab.done{color:var(--green)}
.ni{display:block;font-size:.88rem;margin-bottom:1px}

.con{max-width:560px;margin:0 auto;padding:1rem}

.card{background:#fff;border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);padding:1rem 1.2rem;margin-bottom:.8rem}
.ct{font-family:var(--fm);font-size:.63rem;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;margin-bottom:.75rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)}

.ir{display:flex;gap:.4rem;margin-bottom:.3rem;font-size:.86rem}
.ik{color:var(--dim);min-width:76px;flex-shrink:0}
.iv{color:var(--text);font-weight:500;word-break:break-all}

.field{display:flex;flex-direction:column;gap:.25rem;margin-bottom:.7rem}
.field label{font-family:var(--fm);font-size:.63rem;letter-spacing:.1em;color:var(--dim)}
.field input,.field select,.field textarea{border:1.5px solid var(--border2);border-radius:8px;padding:.5rem .75rem;font-family:var(--fb);font-size:.9rem;color:var(--text);background:#fff;width:100%;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}

/* Extras */
.ex-item{display:flex;align-items:center;justify-content:space-between;padding:.6rem .9rem;border-radius:9px;border:1.5px solid var(--border);background:#fafbfc;cursor:pointer;transition:all .15s;margin-bottom:.45rem}
.ex-item.on{border-color:var(--gold);background:var(--gold-light)}
.ex-left{display:flex;align-items:center;gap:.65rem;flex:1}
.ex-icon{font-size:1rem;flex-shrink:0}
.ex-name{font-size:.86rem;font-weight:500}
.ex-desc{font-size:.7rem;color:var(--dim)}
.ex-right{display:flex;align-items:center;gap:.3rem;flex-shrink:0}
.epfx{font-family:var(--fm);font-size:.8rem;color:var(--gold)}
.epi{font-family:var(--fm);font-size:.82rem;color:var(--gold);background:transparent;border:none;border-bottom:1.5px dashed #c9a84c;width:65px;text-align:right;padding:0 2px;cursor:text}
.epi:focus{outline:none}
.chk{width:21px;height:21px;border-radius:6px;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.75rem;transition:all .15s}
.ex-item.on .chk{background:var(--gold);border-color:var(--gold);color:#fff}

/* Price */
.price-box{background:var(--gold-light);border:1px solid var(--gold-border);border-radius:var(--r);padding:.9rem 1.1rem}
.pr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.35rem;font-size:.84rem}
.pr .pk{color:var(--dim)}
.pr .pv{font-family:var(--fm);color:var(--text)}
.pdiv{height:1px;background:var(--gold-border);margin:.5rem 0}
.ptrow{display:flex;justify-content:space-between;align-items:center}
.ptl{font-size:1rem;font-weight:700}
.ptv{font-family:var(--fm);font-size:1.4rem;color:var(--gold);font-weight:700}

.final-box{background:#fff;border:2px solid var(--gold);border-radius:var(--r);padding:.9rem 1.1rem;margin-top:.8rem}
.final-label{font-family:var(--fm);font-size:.63rem;letter-spacing:.12em;color:var(--gold);margin-bottom:.4rem}
.final-input{font-family:var(--fm);font-size:1.5rem;color:var(--gold);font-weight:700;border:none;border-bottom:2px solid var(--gold-border);width:100%;padding:.15rem 0;background:transparent;text-align:right}
.final-input:focus{outline:none;border-bottom-color:var(--gold)}
.final-note{font-size:.7rem;color:var(--muted);margin-top:.3rem}

/* Signature */
.sig-wrap{border:2px dashed var(--border2);border-radius:10px;background:#f9fafc;overflow:hidden}
#sig-canvas{display:block;width:100%;touch-action:none;cursor:crosshair}
.sig-bar{display:flex;justify-content:space-between;align-items:center;padding:.4rem .75rem;background:#f0f2f7;border-top:1px solid var(--border)}
.sig-hint{font-size:.7rem;color:var(--muted);font-family:var(--fm)}
.sig-clear-btn{background:none;border:1px solid var(--border2);border-radius:6px;padding:.2rem .6rem;font-size:.72rem;color:var(--dim);cursor:pointer;font-family:var(--fm)}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:.4rem;padding:.7rem 1.3rem;border-radius:9px;border:none;font-family:var(--fb);font-size:.9rem;font-weight:600;cursor:pointer;width:100%;margin-top:.4rem;transition:all .15s}
.btn-primary{background:linear-gradient(135deg,#c9a84c,#a07828);color:#fff}
.btn-outline{background:#fff;border:1.5px solid var(--border2);color:var(--dim)}
.btn-green{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff}
.btn-blue{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}
.btn-red2{background:#7c3aed;color:#fff}
.btn-row{display:flex;gap:.5rem}
.btn-row .btn{margin-top:0}

.panel{display:none}
.panel.active{display:block;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

.alert{padding:.7rem .9rem;border-radius:8px;font-size:.82rem;margin-bottom:.8rem}
.alert-green{background:var(--green-light);border:1px solid var(--green-border);color:var(--green)}
.alert-blue{background:var(--blue-light);border:1px solid #bfdbfe;color:var(--blue)}
.alert-gold{background:var(--gold-light);border:1px solid var(--gold-border);color:#7a5500}

/* Receipt */
.receipt{background:#fff;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.1)}
.rh{background:linear-gradient(135deg,#1a1a2e,#2d2d4e);padding:1.1rem 1.4rem;display:flex;justify-content:space-between;align-items:flex-start}
.rh-co{font-family:var(--fs);font-size:1rem;color:#c9a84c;margin-bottom:2px}
.rh-title{font-family:var(--fm);font-size:.65rem;letter-spacing:.15em;color:#888;text-transform:uppercase}
.rh-num{text-align:right;font-family:var(--fm);font-size:.7rem;color:#c9a84c}
.rb{padding:1.1rem 1.4rem}
.rs{margin-bottom:.85rem}
.rst{font-family:var(--fm);font-size:.6rem;letter-spacing:.14em;color:#9a6f10;text-transform:uppercase;margin-bottom:.4rem;padding-bottom:.28rem;border-bottom:1px solid #e8d9a8}
.rrow{display:flex;gap:.4rem;margin-bottom:.22rem;font-size:.82rem}
.rk{color:#888;min-width:72px;flex-shrink:0}
.rv{color:#222;font-weight:500;word-break:break-all}
.rtbl{width:100%;border-collapse:collapse;margin-bottom:.9rem;font-size:.82rem}
.rtbl th{background:#f0f3f8;padding:.45rem .8rem;text-align:left;color:#666;border-bottom:2px solid #e2e6ef;font-family:var(--fm);font-size:.6rem;letter-spacing:.1em}
.rtbl td{padding:.45rem .8rem;border-bottom:1px solid #f0f0f0;color:#333}
.rtbl tr:last-child td{border-bottom:none}
.rtdp{font-family:var(--fm);color:#9a6f10!important;text-align:right!important}
.rtotal{display:flex;justify-content:flex-end;align-items:center;gap:1.5rem;padding:.75rem 1rem;background:#fdf8ee;border-radius:9px;border:1px solid #e8d9a8;margin-bottom:.85rem}
.rtl{font-size:.9rem;font-weight:600;color:#444}
.rtv{font-family:var(--fm);font-size:1.3rem;color:#b8870a;font-weight:700}
.r-stamps{display:flex;gap:.8rem;justify-content:flex-end;flex-wrap:wrap;padding:.5rem 0}
.rsig{border-top:2px dashed #e0e4ef;padding:.85rem 0 .4rem;margin-top:.4rem}
.rsig-t{font-family:var(--fm);font-size:.6rem;letter-spacing:.14em;color:#999;text-transform:uppercase;margin-bottom:.5rem}
.rsig-box{border:1.5px dashed #ccc;border-radius:8px;background:#f9fafc;overflow:hidden;min-height:80px;display:flex;align-items:center;justify-content:center}
.rsig-box img{max-width:100%}
.rsig-date{font-size:.74rem;color:#888;margin-top:.25rem;font-family:var(--fm)}
.rf{background:#f5f7fb;padding:.7rem 1.4rem;display:flex;justify-content:space-between;font-size:.68rem;color:#aaa;font-family:var(--fm);border-top:1px solid #e8eaf0}

/* Records */
.rec-item{background:#fff;border:1px solid var(--border);border-radius:10px;padding:.85rem 1rem;margin-bottom:.6rem}
.rec-top{display:flex;justify-content:space-between;margin-bottom:.25rem}
.rec-num{font-family:var(--fm);font-size:.68rem;color:var(--gold)}
.rec-date{font-family:var(--fm);font-size:.65rem;color:var(--muted)}
.rec-name{font-size:.88rem;font-weight:600;margin-bottom:.15rem}
.rec-info{font-size:.76rem;color:var(--dim)}
.rec-amt{font-family:var(--fm);font-size:.92rem;color:var(--gold);font-weight:700}
.rec-del{background:none;border:1px solid #fca5a5;border-radius:6px;padding:.18rem .6rem;font-size:.7rem;color:var(--red);cursor:pointer;margin-top:.5rem;font-family:var(--fm)}
.no-rec{text-align:center;color:var(--muted);padding:2.5rem 1rem;font-size:.88rem}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="ht">司機結單系統</div>
    <div class="hs">DRIVER COMPLETION</div>
  </div>
  <div style="display:flex;align-items:center;gap:.4rem">
    <div class="hbadge" id="hbadge" style="display:none"></div>
    <div class="hbtns">
      <button class="hbtn" onclick="showRecords()">&#128196; 紀錄</button>
      <button class="hbtn" onclick="newOrder()">&#43; 新單</button>
    </div>
  </div>
</div>

<div class="nav" id="main-nav">
  <div class="nav-tab active" id="tab-1" onclick="goStep(1)"><span class="ni">📋</span>資訊</div>
  <div class="nav-tab" id="tab-2" onclick="goStep(2)"><span class="ni">⏱️</span>時間</div>
  <div class="nav-tab" id="tab-3" onclick="goStep(3)"><span class="ni">💰</span>費用</div>
  <div class="nav-tab" id="tab-4" onclick="goStep(4)"><span class="ni">✍️</span>簽名</div>
  <div class="nav-tab" id="tab-5" onclick="goStep(5)"><span class="ni">✅</span>完成</div>
</div>

<!-- STEP 1 資訊 -->
<div class="panel active" id="panel-1">
  <div class="con">
    <div id="loaded-banner" style="display:none" class="alert alert-green"></div>
    <div class="card">
      <div class="ct">&#128100; 客戶資訊</div>
      <div class="ir"><span class="ik">姓名</span><span class="iv" id="d-name">—</span></div>
      <div class="ir"><span class="ik">電話</span><span class="iv" id="d-ctel">—</span></div>
      <div class="ir"><span class="ik">人數</span><span class="iv" id="d-pax">—</span></div>
    </div>
    <div class="card">
      <div class="ct">&#128663; 車輛 / 司機</div>
      <div class="ir"><span class="ik">車型</span><span class="iv" id="d-car">—</span></div>
      <div class="ir"><span class="ik">車牌</span><span class="iv" id="d-plate">—</span></div>
      <div class="ir"><span class="ik">司機</span><span class="iv" id="d-driver">—</span></div>
    </div>
    <div class="card">
      <div class="ct">&#128205; 行程資訊</div>
      <div class="ir"><span class="ik">服務類型</span><span class="iv" id="d-type">—</span></div>
      <div class="ir"><span class="ik">起點</span><span class="iv" id="d-from">—</span></div>
      <div class="ir"><span class="ik">目的地</span><span class="iv" id="d-to">—</span></div>
      <div class="ir"><span class="ik">日期</span><span class="iv" id="d-date">—</span></div>
      <div class="ir" id="d-note-row" style="display:none"><span class="ik">備註</span><span class="iv" id="d-note">—</span></div>
    </div>
    <div class="card">
      <div class="ct">&#128176; 費用</div>
      <div class="ir"><span class="ik">基本費用</span><span class="iv" id="d-base">—</span></div>
      <div class="ir"><span class="ik">付款方式</span><span class="iv" id="d-pay">—</span></div>
    </div>
    <button class="btn btn-primary" onclick="goStep(2)">下一步：時間 →</button>
  </div>
</div>

<!-- STEP 2 時間 -->
<div class="panel" id="panel-2">
  <div class="con">
    <div class="card">
      <div class="ct">&#9200; 上下車時間</div>
      <div class="g2">
        <div class="field"><label>上車時間</label><input id="s-pickup" list="tl" placeholder="00:00" autocomplete="off"></div>
        <div class="field"><label>下車時間</label><input id="s-dropoff" list="tl" placeholder="00:00" autocomplete="off"></div>
        <datalist id="tl"></datalist>
      </div>
      <div id="dur-box" style="display:none" class="alert alert-gold">
        行程時間：<strong id="dur-text"></strong>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="goStep(1)">← 返回</button>
      <button class="btn btn-primary" onclick="goStep(3)">下一步：費用 →</button>
    </div>
  </div>
</div>

<!-- STEP 3 費用 -->
<div class="panel" id="panel-3">
  <div class="con">
    <div class="card">
      <div class="ct">&#11088; 附加服務</div>
      <div id="extras-list"></div>
    </div>
    <div class="card">
      <div class="ct">&#128176; 費用試算</div>
      <div class="price-box">
        <div id="price-rows"></div>
        <div class="pdiv"></div>
        <div class="ptrow">
          <span class="ptl">系統試算</span>
          <span class="ptv" id="price-total">NT$ 0</span>
        </div>
      </div>
      <div class="final-box">
        <div class="final-label">&#9998; 最終實收金額（可修改）</div>
        <input class="final-input" type="number" id="final-amount" placeholder="0" min="0">
        <div class="final-note">如有加時或其他費用請在此調整</div>
      </div>
    </div>
    <div class="card">
      <div class="ct">&#128179; 付款方式</div>
      <div class="field">
        <select id="s-pay">
          <option value="現金付款">現金付款</option>
          <option value="轉帳匯款">轉帳匯款</option>
          <option value="信用卡">信用卡</option>
          <option value="LINE Pay">LINE Pay</option>
          <option value="月結">月結</option>
        </select>
      </div>
      <div class="field"><label>備註</label><textarea id="s-note" rows="2" placeholder="如有特殊情況請備註…"></textarea></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="goStep(2)">← 返回</button>
      <button class="btn btn-primary" onclick="goStep(4)">下一步：簽名 →</button>
    </div>
  </div>
</div>

<!-- STEP 4 簽名 -->
<div class="panel" id="panel-4">
  <div class="con">
    <div class="alert alert-blue">請將手機交給客人，在下方空白處簽名確認。</div>
    <div class="card">
      <div class="ct">&#9997;&#65039; 客人簽名</div>
      <div class="field"><label>簽名日期</label><input type="date" id="s-sig-date"></div>
      <div class="sig-wrap">
        <canvas id="sig-canvas" height="180"></canvas>
        <div class="sig-bar">
          <span class="sig-hint">請用手指簽名</span>
          <button class="sig-clear-btn" onclick="clearSig()">&#10005; 重簽</button>
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="goStep(3)">← 返回</button>
      <button class="btn btn-green" onclick="completeOrder()">&#10003; 完成結單</button>
    </div>
  </div>
</div>

<!-- STEP 5 完成 -->
<div class="panel" id="panel-5">
  <div class="con">
    <div class="alert alert-green">&#10003; 結單完成！請儲存後回傳。</div>
    <div class="btn-row" style="margin-bottom:.8rem">
      <button class="btn btn-blue" onclick="saveImg()">&#128247; 存圖片</button>
      <button class="btn btn-red2" onclick="savePDF()">&#128196; 存 PDF</button>
    </div>
    <div id="receipt-wrap"></div>
    <button class="btn btn-outline" onclick="newOrder()" style="margin-top:.8rem">&#128260; 新的結單</button>
  </div>
</div>

<!-- RECORDS -->
<div class="panel" id="panel-records">
  <div class="con">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <div style="font-weight:600">&#128196; 結單紀錄</div>
      <button onclick="clearAllRec()" style="background:none;border:1px solid #fca5a5;border-radius:6px;padding:.25rem .7rem;font-size:.74rem;color:var(--red);cursor:pointer">清除全部</button>
    </div>
    <div id="rec-list"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
var orderData = {};
var EXTRAS = [];
var sigCanvas, sigCtx, drawing=false, lx=0, ly=0;
var baseAmt = 0;

window.onload = function() {
  var today = new Date().toISOString().slice(0,10);
  document.getElementById('s-sig-date').value = today;
  buildTimeList();
  initSig();
  document.getElementById('s-pickup').addEventListener('input', calcDur);
  document.getElementById('s-dropoff').addEventListener('input', calcDur);
  loadFromURL();
};

function buildTimeList() {
  var dl = document.getElementById('tl');
  for (var h=0; h<24; h++) {
    for (var m=0; m<60; m+=5) {
      var o = document.createElement('option');
      o.value = (h<10?'0'+h:''+h)+':'+(m<10?'0'+m:''+m);
      dl.appendChild(o);
    }
  }
}

function loadFromURL() {
  try {
    var p = new URLSearchParams(window.location.search);
    var d = p.get('d');
    if (!d) {
      document.getElementById('loaded-banner').textContent = '⚠️ 連結沒有帶入資料，請重新從報價單產生連結';
      document.getElementById('loaded-banner').style.display = '';
      document.getElementById('loaded-banner').style.background = '#fef2f2';
      document.getElementById('loaded-banner').style.borderColor = '#fca5a5';
      document.getElementById('loaded-banner').style.color = '#dc2626';
      loadDefaultExtras();
      return;
    }
    // URL-safe base64 轉回標準 base64
    d = d.replace(/-/g, '+').replace(/_/g, '/');
    while (d.length % 4) d += '=';
    // 正確解碼中文
    var jsonStr = decodeURIComponent(Array.prototype.map.call(atob(d), function(c) {
      return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
    var data = JSON.parse(jsonStr);
    orderData = data;

    function sv(id, v) { var el=document.getElementById(id); if(el) el.textContent=v||'—'; }
    sv('d-name', data.n);
    sv('d-ctel', data.ct || '');
    sv('d-pax', data.p ? data.p+' 人' : '');
    sv('d-car', data.c);
    sv('d-plate', data.pl || '');
    sv('d-driver', data.dr || '');
    sv('d-type', data.tp);
    sv('d-from', data.fr);
    sv('d-to', data.to || '');
    sv('d-date', data.dt);
    sv('d-pay', data.py || '');
    baseAmt = parseInt(data.b) || 0;
    sv('d-base', baseAmt > 0 ? 'NT$ ' + baseAmt.toLocaleString() : '—');
    if (data.no) {
      sv('d-note', data.no);
      document.getElementById('d-note-row').style.display = '';
    }

    // 設定付款方式
    if (data.py) {
      var payEl = document.getElementById('s-pay');
      for (var i=0; i<payEl.options.length; i++) {
        if (payEl.options[i].value === data.py) { payEl.selectedIndex=i; break; }
      }
    }

    // 附加服務：優先從 localStorage 讀取（同裝置），否則用預設值
    var savedExtras = null;
    try { savedExtras = JSON.parse(localStorage.getItem('quoteExtras')||'null'); } catch(ex){}
    if (savedExtras && savedExtras.length) {
      EXTRAS = savedExtras.map(function(e, i) {
        return { id:'ex'+i, icon:'', name:e[0]||'', desc:e[1]||'', price:parseInt(e[2])||0, on:false };
      });
    } else {
      loadDefaultExtras();
    }
    renderExtras(); // baseAmt 已設好，試算正確

    if (data.id) {
      var hb = document.getElementById('hbadge');
      hb.textContent = data.id; hb.style.display = '';
    }
    var banner = document.getElementById('loaded-banner');
    banner.textContent = '✅ 已載入報價單 '+(data.id||'');
    banner.style.display = '';
  } catch(e) {
    console.log('loadFromURL error:', e);
    var banner = document.getElementById('loaded-banner');
    banner.textContent = '⚠️ 資料載入失敗，請重新從報價單產生連結（錯誤：'+e.message+')';
    banner.style.cssText = 'display:block;background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;padding:.7rem .9rem;border-radius:8px;font-size:.8rem;margin-bottom:.8rem';
    loadDefaultExtras();
  }
}

function loadDefaultExtras() {
  EXTRAS = [
    {id:'night',icon:'&#127769;',name:'深夜加成',desc:'23:00-06:00',price:300,on:false},
    {id:'highway',icon:'&#128739;',name:'高速費代墊',desc:'依實際費用',price:200,on:false},
    {id:'overtime',icon:'&#9200;',name:'加時費用',desc:'每30分鐘',price:200,on:false},
    {id:'baby',icon:'&#128118;',name:'嬰兒安全座椅',desc:'每張',price:300,on:false},
    {id:'luggage',icon:'&#129523;',name:'大型行李服務',desc:'4件以上',price:200,on:false},
    {id:'custom',icon:'&#10133;',name:'其他費用',desc:'自訂',price:0,on:false}
  ];
  renderExtras();
}

function renderExtras() {
  var html = '';
  EXTRAS.forEach(function(e) {
    html += '<div class="ex-item '+(e.on?'on':'')+'" onclick="toggleEx(\''+e.id+'\')">'
      +'<div class="ex-left">'
      +'<div class="chk">'+(e.on?'&#10003;':'')+'</div>'
      +(e.icon?'<span class="ex-icon">'+e.icon+'</span>':'')
      +'<div><div class="ex-name">'+e.name+'</div><div class="ex-desc">'+e.desc+'</div></div>'
      +'</div>'
      +'<div class="ex-right">'
      +'<span class="epfx">+NT$</span>'
      +'<input class="epi" type="number" min="0" value="'+e.price+'" onclick="event.stopPropagation()" oninput="updateExPrice(\''+e.id+'\',this.value)">'
      +'</div></div>';
  });
  document.getElementById('extras-list').innerHTML = html;
  updatePrice();
}

function toggleEx(id) {
  var ex = EXTRAS.find(function(e){ return e.id===id; });
  if (ex) { ex.on=!ex.on; renderExtras(); }
}

function updateExPrice(id, val) {
  var ex = EXTRAS.find(function(e){ return e.id===id; });
  if (ex) { ex.price=parseInt(val)||0; updatePrice(); }
}

function updatePrice() {
  var rows = '<div class="pr"><span class="pk">基本費用</span><span class="pv">'+(baseAmt>0?'NT$ '+baseAmt.toLocaleString():'—')+'</span></div>';
  var total = baseAmt;
  EXTRAS.forEach(function(e){
    if (e.on) {
      rows += '<div class="pr"><span class="pk">'+e.name+'</span><span class="pv">'+(e.price>0?'+NT$ '+e.price.toLocaleString():'—')+'</span></div>';
      total += e.price;
    }
  });
  document.getElementById('price-rows').innerHTML = rows;
  document.getElementById('price-total').textContent = total>0 ? 'NT$ '+total.toLocaleString() : '—';
  document.getElementById('final-amount').value = total>0 ? total : '';
}

function calcDur() {
  var p=document.getElementById('s-pickup').value, d=document.getElementById('s-dropoff').value;
  var box=document.getElementById('dur-box');
  if (!p||!d){box.style.display='none';return;}
  var pm=toMin(p),dm=toMin(d);
  if(dm<=pm) dm+=1440;
  var diff=dm-pm,h=Math.floor(diff/60),m=diff%60;
  document.getElementById('dur-text').textContent=(h>0?h+'小時':'')+(m>0?m+'分鐘':'');
  box.style.display='';
}

function toMin(t){var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]);}
function gv(id){var el=document.getElementById(id);return el?(el.value||'').trim():'';}

function goStep(n) {
  for (var i=1; i<=5; i++) {
    var pa=document.getElementById('panel-'+i), ta=document.getElementById('tab-'+i);
    if(pa) pa.classList.toggle('active',i===n);
    if(ta){ta.classList.remove('active','done');if(i===n)ta.classList.add('active');else if(i<n)ta.classList.add('done');}
  }
  document.getElementById('panel-records').classList.remove('active');
  document.getElementById('main-nav').style.display='';
  window.scrollTo(0,0);
}

function showRecords(){
  for(var i=1;i<=5;i++){var pa=document.getElementById('panel-'+i);if(pa)pa.classList.remove('active');}
  document.getElementById('panel-records').classList.add('active');
  document.getElementById('main-nav').style.display='none';
  renderRecords();
  window.scrollTo(0,0);
}

function initSig(){
  sigCanvas=document.getElementById('sig-canvas');
  if(!sigCanvas)return;
  sigCanvas.width=(sigCanvas.offsetWidth||320)*2;
  sigCanvas.height=360;
  sigCtx=sigCanvas.getContext('2d');
  sigCtx.strokeStyle='#1a1a2e';sigCtx.lineWidth=3;sigCtx.lineCap='round';sigCtx.lineJoin='round';
  function pos(e){
    var r=sigCanvas.getBoundingClientRect(),sx=sigCanvas.width/r.width,sy=sigCanvas.height/r.height,src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};
  }
  sigCanvas.addEventListener('mousedown',function(e){e.preventDefault();drawing=true;var p=pos(e);lx=p.x;ly=p.y;});
  sigCanvas.addEventListener('mousemove',function(e){e.preventDefault();if(!drawing)return;var p=pos(e);sigCtx.beginPath();sigCtx.moveTo(lx,ly);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();lx=p.x;ly=p.y;});
  sigCanvas.addEventListener('mouseup',function(e){e.preventDefault();drawing=false;});
  sigCanvas.addEventListener('mouseleave',function(e){e.preventDefault();drawing=false;});
  sigCanvas.addEventListener('touchstart',function(e){e.preventDefault();drawing=true;var p=pos(e);lx=p.x;ly=p.y;},{passive:false});
  sigCanvas.addEventListener('touchmove',function(e){e.preventDefault();if(!drawing)return;var p=pos(e);sigCtx.beginPath();sigCtx.moveTo(lx,ly);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();lx=p.x;ly=p.y;},{passive:false});
  sigCanvas.addEventListener('touchend',function(e){e.preventDefault();drawing=false;},{passive:false});
}

function clearSig(){if(sigCtx)sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height);}
function isSigEmpty(){var b=document.createElement('canvas');b.width=sigCanvas.width;b.height=sigCanvas.height;return sigCanvas.toDataURL()===b.toDataURL();}

function completeOrder(){
  if(isSigEmpty()){alert('請先請客人簽名！');return;}
  var finalAmt=parseInt(gv('final-amount'))||0;
  var sigImg=sigCanvas.toDataURL('image/png');
  var num=orderData.id||('R-'+Date.now().toString().slice(-6));
  var now=new Date().toLocaleDateString('zh-TW');
  var pickup=gv('s-pickup'),dropoff=gv('s-dropoff'),durText='';
  if(pickup&&dropoff){var pm=toMin(pickup),dm=toMin(dropoff);if(dm<=pm)dm+=1440;var diff=dm-pm,h=Math.floor(diff/60),m=diff%60;durText=(h>0?h+'小時':'')+(m>0?m+'分鐘':'');}

  var saved={};
  try{saved=JSON.parse(localStorage.getItem('quoteStamps')||'{}');}catch(e){}
  var coName=saved.companyName||'';
  var slabels={company:'公司印',person:'負責人',tax:'統一編號'};
  var ssizes={company:'80px',person:'80px',tax:'100px'};
  var stampsHtml='';
  ['company','person','tax'].forEach(function(t){
    if(saved[t]) stampsHtml+='<div style="display:flex;flex-direction:column;align-items:center;gap:.25rem"><img src="'+saved[t]+'" style="width:'+ssizes[t]+';height:'+ssizes[t]+';object-fit:contain;opacity:.9"><div style="font-size:.65rem;color:#888;font-family:DM Mono,monospace">'+slabels[t]+'</div></div>';
  });

  var extrasRows='';
  EXTRAS.forEach(function(e){
    if(e.on) extrasRows+='<tr><td>'+e.name+'</td><td>'+e.desc+'</td><td class="rtdp">'+(e.price>0?'+NT$ '+e.price.toLocaleString():'—')+'</td></tr>';
  });

  function gt(id){var el=document.getElementById(id);return el?el.textContent.trim():'';}
  function rrow(k,v){if(!v||v==='—')return'';return'<div class="rrow"><span class="rk">'+k+'</span><span class="rv">'+v+'</span></div>';}

  var html='<div class="receipt" id="the-receipt">'
    +'<div class="rh"><div>'
    +(coName?'<div class="rh-co">'+coName+'</div>':'')
    +'<div class="rh-title">行程結算單</div></div>'
    +'<div class="rh-num"><div>'+num+'</div><div style="font-size:.6rem;color:#555;margin-top:2px">'+now+'</div></div>'
    +'</div>'
    +'<div class="rb">'
    +'<div class="rs"><div class="rst">客戶資訊</div>'
    +rrow('姓名',gt('d-name'))+rrow('人數',gt('d-pax'))
    +'</div>'
    +'<div class="rs"><div class="rst">車輛 / 司機</div>'
    +rrow('車型',gt('d-car'))+rrow('車牌',gt('d-plate'))+rrow('司機',gt('d-driver'))
    +'</div>'
    +'<div class="rs"><div class="rst">行程資訊</div>'
    +rrow('服務',gt('d-type'))+rrow('起點',gt('d-from'))+rrow('目的地',gt('d-to'))
    +rrow('日期',gt('d-date'))
    +(pickup?rrow('上車',pickup):'')+(dropoff?rrow('下車',dropoff):'')
    +(durText?rrow('行程時間',durText):'')
    +(gt('d-note')&&gt('d-note')!=='—'?rrow('備註',gt('d-note')):'')
    +'</div>'
    +'<table class="rtbl"><thead><tr><th>項目</th><th>說明</th><th style="text-align:right">金額</th></tr></thead>'
    +'<tbody><tr><td>基本費用</td><td>'+gt('d-type')+'</td><td class="rtdp">'+(baseAmt>0?'NT$ '+baseAmt.toLocaleString():'—')+'</td></tr>'
    +extrasRows+'</tbody></table>'
    +'<div class="rtotal"><span class="rtl">實收金額</span><span class="rtv">'+(finalAmt>0?'NT$ '+finalAmt.toLocaleString():'—')+'</span></div>'
    +rrow('付款方式',gv('s-pay'))
    +(gv('s-note')?rrow('備註',gv('s-note')):'')
    +(stampsHtml?'<div class="r-stamps">'+stampsHtml+'</div>':'')
    +'<div class="rsig"><div class="rsig-t">客人簽名確認</div>'
    +'<div class="rsig-box"><img src="'+sigImg+'"></div>'
    +'<div class="rsig-date">簽名日期：'+(gv('s-sig-date')||now)+'　單號：'+num+'</div>'
    +'</div></div>'
    +'<div class="rf"><span>'+(coName||'感謝您的搭乘')+'</span><span>'+num+'</span></div>'
    +'</div>';

  document.getElementById('receipt-wrap').innerHTML=html;

  saveRec({num:num,date:now,name:gt('d-name'),car:gt('d-car'),type:gt('d-type'),finalAmt:finalAmt,pickup:pickup,dropoff:dropoff});
  goStep(5);
}

function saveImg(){
  var el=document.getElementById('the-receipt');
  if(!el)return;
  if(typeof html2canvas==='undefined'){alert('需要網路連線才能存圖片');return;}
  html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#fff'}).then(function(canvas){
    var link=document.createElement('a');
    link.download='結單-'+new Date().toISOString().slice(0,10)+'.png';
    link.href=canvas.toDataURL('image/png');link.click();
  });
}

function savePDF(){
  var el=document.getElementById('the-receipt');
  if(!el)return;
  if(typeof html2canvas==='undefined'||typeof jspdf==='undefined'){alert('需要網路連線才能存PDF');return;}
  html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#fff'}).then(function(canvas){
    var imgData=canvas.toDataURL('image/png');
    var pdf=new jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    var w=pdf.internal.pageSize.getWidth(),h=canvas.height*w/canvas.width;
    pdf.addImage(imgData,'PNG',0,0,w,h);
    pdf.save('結單-'+new Date().toISOString().slice(0,10)+'.pdf');
  });
}

function getRecs(){try{return JSON.parse(localStorage.getItem('driverRecs')||'[]');}catch(e){return[];}}
function saveRec(r){try{var recs=getRecs();recs.unshift(r);if(recs.length>100)recs=recs.slice(0,100);localStorage.setItem('driverRecs',JSON.stringify(recs));}catch(e){}}
function delRec(i){var recs=getRecs();recs.splice(i,1);localStorage.setItem('driverRecs',JSON.stringify(recs));renderRecords();}
function clearAllRec(){localStorage.removeItem('driverRecs');renderRecords();}
function renderRecords(){
  var recs=getRecs(),el=document.getElementById('rec-list');
  if(!recs.length){el.innerHTML='<div class="no-rec">尚無結單紀錄</div>';return;}
  el.innerHTML=recs.map(function(r,i){
    return '<div class="rec-item">'
      +'<div class="rec-top"><span class="rec-num">'+r.num+'</span><span class="rec-date">'+r.date+'</span></div>'
      +'<div class="rec-name">'+(r.name||'—')+'</div>'
      +'<div style="display:flex;justify-content:space-between;align-items:center">'
      +'<div class="rec-info">'+(r.car||'—')+'・'+(r.type||'—')+'</div>'
      +'<div class="rec-amt">'+(r.finalAmt>0?'NT$ '+r.finalAmt.toLocaleString():'—')+'</div>'
      +'</div>'
      +(r.pickup&&r.dropoff?'<div class="rec-info" style="margin-top:.1rem">&#8593; '+r.pickup+' &#8595; '+r.dropoff+'</div>':'')
      +'<button class="rec-del" onclick="delRec('+i+')">&#128465; 刪除</button>'
      +'</div>';
  }).join('');
}

function newOrder(){
  orderData={};baseAmt=0;
  document.getElementById('final-amount').value='';
  document.getElementById('s-pickup').value='';
  document.getElementById('s-dropoff').value='';
  document.getElementById('s-note').value='';
  document.getElementById('dur-box').style.display='none';
  document.getElementById('s-sig-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('loaded-banner').style.display='none';
  document.getElementById('hbadge').style.display='none';
  ['d-name','d-ctel','d-pax','d-car','d-plate','d-driver','d-type','d-from','d-to','d-date','d-base','d-pay','d-note'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.textContent='—';
  });
  clearSig();
  loadDefaultExtras();
  goStep(1);
}
</script>
